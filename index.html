```html
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스마트 약 복용 알리미</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #f1f5f9;
  display: flex;
  justify-content: center;
  padding: 20px;
}

.phone {
  width: 100%;
  max-width: 420px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.menu {
  background: #0f172a;
  color: white;
  padding: 20px;
  border-radius: 24px;
}

.menu h1 {
  text-align: center;
  margin-bottom: 18px;
}

.menu-buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}

.menu-buttons button {
  border: none;
  border-radius: 16px;
  padding: 10px;
  background: #334155;
  color: white;
  cursor: pointer;
  font-size: 13px;
  font-weight: bold;
}

.menu-buttons button.active {
  background: white;
  color: #0f172a;
}

.section {
  display: none;
  background: white;
  padding: 20px;
  border-radius: 24px;
}

.section.active {
  display: block;
}

.input-group {
  margin-bottom: 16px;
}

.input-group label {
  display: block;
  margin-bottom: 8px;
  font-weight: bold;
}

.input-group input,
.input-group select {
  width: 100%;
  padding: 14px;
  border-radius: 16px;
  border: 1px solid #cbd5e1;
}

.main-button,
.alert-button,
.pharmacy-button {
  width: 100%;
  border: none;
  border-radius: 18px;
  padding: 14px;
  color: white;
  font-weight: bold;
  cursor: pointer;
  margin-top: 14px;
}

.main-button {
  background: #0f172a;
}

.alert-button {
  background: #10b981;
}

.pharmacy-button {
  background: #3b82f6;
}

.card {
  border: 1px solid #e2e8f0;
  border-radius: 22px;
  padding: 16px;
  margin-top: 16px;
}

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

.badge {
  background: #e2e8f0;
  padding: 6px 12px;
  border-radius: 999px;
  font-size: 13px;
}

.time-box {
  background: #f1f5f9;
  border-radius: 18px;
  padding: 12px;
  margin-top: 10px;
}

.symptoms {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.symptoms button {
  border: none;
  background: #e2e8f0;
  border-radius: 999px;
  padding: 10px 16px;
  cursor: pointer;
}

.recommend-box {
  background: #f1f5f9;
  padding: 16px;
  border-radius: 18px;
  margin-top: 18px;
  line-height: 1.7;
}

.empty {
  background: #f1f5f9;
  padding: 16px;
  border-radius: 18px;
  color: #64748b;
}
</style>
</head>

<body>
<div class="phone">

<div class="menu">
<h1>스마트 약 복용 알리미</h1>

<div class="menu-buttons">
<button class="active" onclick="showMenu('info', this); speak('사용자 정보 메뉴입니다');">정보</button>
<button onclick="showMenu('schedule', this); speak('복용 스케줄 메뉴입니다');">스케줄</button>
<button onclick="showMenu('medicine', this); speak('약 찾기 메뉴입니다');">약찾기</button>
<button onclick="showMenu('pharmacy', this); speak('주변 약국 메뉴입니다');">약국</button>
</div>
</div>

<div id="info" class="section active">
<h2>사용자 정보</h2>

<div class="input-group">
<label>나이</label>
<input type="number" id="age" placeholder="예: 17">
</div>

<div class="input-group">
<label>몸무게</label>
<input type="number" id="weight" placeholder="예: 58">
</div>

<div class="input-group">
<label>복용 횟수</label>
<select>
<option>하루 1번</option>
<option>하루 2번</option>
<option>하루 3번</option>
</select>
</div>
</div>

<div id="schedule" class="section">
<h2>복용 스케줄</h2>

<div class="input-group">
<label>약 이름</label>
<input type="text" id="medicineName" placeholder="예: 감기약">
</div>

<div class="input-group">
<label>복용 시간</label>
<input type="time" id="medicineTime">
</div>

<button class="main-button" onclick="addMedication()">
+ 약 추가
</button>

<div id="medicationList" style="margin-top:20px;">
<div class="empty">
아직 추가된 약이 없습니다.
</div>
</div>
</div>

<div id="medicine" class="section">
<h2>증상으로 약 찾기</h2>

<div class="symptoms">
<button onclick="recommendMedicine('두통')">두통</button>
<button onclick="recommendMedicine('기침')">기침</button>
<button onclick="recommendMedicine('감기')">감기</button>
<button onclick="recommendMedicine('복통')">복통</button>
<button onclick="recommendMedicine('알레르기')">알레르기</button>
</div>

<div class="recommend-box" id="recommendBox">
증상을 선택하면 추천 약이 표시됩니다.
</div>
</div>

<div id="pharmacy" class="section">
<h2>주변 약국</h2>

<div class="card">
<div class="card-header">
<h3>행복약국</h3>
<span>450m</span>
</div>

<p>운영시간: 24시간 운영</p>
<button class="pharmacy-button">길찾기</button>
</div>
</div>

</div>

<script>
function speak(text) {
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();

    const speech = new SpeechSynthesisUtterance(text);
    speech.lang = 'ko-KR';
    speech.rate = 0.9;

    window.speechSynthesis.speak(speech);
  }
}

function showMenu(menuId, buttonElement) {
  const sections = document.querySelectorAll('.section');

  sections.forEach(section => {
    section.classList.remove('active');
  });

  document.getElementById(menuId).classList.add('active');

  const buttons = document.querySelectorAll('.menu-buttons button');

  buttons.forEach(button => {
    button.classList.remove('active');
  });

  buttonElement.classList.add('active');
}

function addMedication() {
  const medicineName = document.getElementById('medicineName').value;
  const medicineTime = document.getElementById('medicineTime').value;

  if (!medicineName || !medicineTime) {
    alert('약 이름과 시간을 입력해주세요.');
    speak('약 이름과 시간을 입력해주세요');
    return;
  }

  const medicationList = document.getElementById('medicationList');

  if (medicationList.innerHTML.includes('아직 추가된 약이 없습니다')) {
    medicationList.innerHTML = '';
  }

  const card = document.createElement('div');
  card.className = 'card';

  card.innerHTML = `
    <div class="card-header">
      <h3>${medicineName}</h3>
      <span class="badge">복용 약</span>
    </div>

    <div class="time-box">
      <p>복용 시간</p>
      <h3>${medicineTime}</h3>
    </div>

    <button class="alert-button" onclick="setAlert('${medicineName}', '${medicineTime}')">
      알림 설정
    </button>
  `;

  medicationList.appendChild(card);

  speak(medicineName + '이 추가되었습니다');

  document.getElementById('medicineName').value = '';
  document.getElementById('medicineTime').value = '';
}

function setAlert(name, time) {
  const now = new Date();
  const target = new Date();

  const parts = time.split(':');

  target.setHours(parts[0]);
  target.setMinutes(parts[1]);
  target.setSeconds(0);

  if (target.getTime() <= now.getTime()) {
    target.setDate(target.getDate() + 1);
  }

  const diff = target.getTime() - now.getTime();

  alert(name + ' 알림이 설정되었습니다.');
  speak(name + ' 알림이 설정되었습니다');

  setTimeout(() => {
    alert(name + ' 복용 시간입니다!');
    speak(name + ' 복용 시간입니다');
  }, diff);
}

function recommendMedicine(symptom) {
  const age = Number(document.getElementById('age').value);
  const weight = Number(document.getElementById('weight').value);

  const medicines = {
    두통: ['타이레놀', '1회 1정', '소아용 해열제'],
    기침: ['기침 시럽', '1회 10ml', '1회 5ml'],
    감기: ['종합 감기약', '1회 2정', '소아용 감기약'],
    복통: ['위장약', '1회 1정', '소아 복용량 확인'],
    알레르기: ['항히스타민제', '1회 1정', '소아용 알레르기약']
  };

  const info = medicines[symptom];

  let dose = info[1];

  if (age < 15 || weight < 45) {
    dose = info[2];
  }

  document.getElementById('recommendBox').innerHTML = `
    <strong>증상:</strong> ${symptom}<br>
    <strong>추천 약:</strong> ${info[0]}<br>
    <strong>복용량:</strong> ${dose}
  `;

  speak(symptom + ' 추천 약은 ' + info[0] + '입니다');
}
</script>

</body>
</html>
```
